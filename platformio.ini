; COSMIC-C3 FREE ART PORTAL — T-QT Pro Edition
; LilyGO T-QT Pro ESP32-S3 · 128x128 GC9A01 circular display

[platformio]
default_envs = T-QT-Pro-N4R2
boards_dir   = ./boards

; 4MB Flash + 2MB PSRAM  (serial numbers K192, H579, H590)
[env:T-QT-Pro-N4R2]
platform  = espressif32@6.6.0
board     = esp32-s3-t-qt-pro
framework = arduino
monitor_speed = 115200

; Use min_spiffs partition so the full portal HTML fits comfortably
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -DBOARD_HAS_PSRAM
    ; ── TFT_eSPI: bypass User_Setup_Select.h entirely ──
    -DUSER_SETUP_LOADED
    -DGC9A01_DRIVER
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DTFT_BACKLIGHT_ON=0
    -DTFT_BL=10
    -DTFT_MISO=-1
    -DTFT_MOSI=2
    -DTFT_SCLK=3
    -DTFT_CS=5
    -DTFT_DC=6
    -DTFT_RST=1
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DCORE_DEBUG_LEVEL=0

; 8MB Flash, no PSRAM  (serial numbers K191, H628, H588)
[env:T-QT-Pro-N8]
platform  = espressif32@6.6.0
board     = esp32-s3-t-qt-pro-n8
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -DUSER_SETUP_LOADED
    -DGC9A01_DRIVER
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DTFT_BACKLIGHT_ON=0
    -DTFT_BL=10
    -DTFT_MISO=-1
    -DTFT_MOSI=2
    -DTFT_SCLK=3
    -DTFT_CS=5
    -DTFT_DC=6
    -DTFT_RST=1
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DCORE_DEBUG_LEVEL=0
